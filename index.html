<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>당일치기 빠지 플래너 · 7/16</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#080c10;--panel:#0e1520;--panel2:#121c2a;
    --ink:#e4ddd0;--ink-soft:#7a8c9c;--ink-dim:#2e3e4e;
    --line:#1a2a3a;--line2:#243244;
    --gold:#c8a44a;--gold-light:#e2be72;--gold-dim:#5a4418;--gold-glow:rgba(200,164,74,.12);
    --teal:#1a9080;--teal-light:#50c8b8;--teal-glow:rgba(26,144,128,.12);
    --coral:#c05838;--moss:#4e9060;--warn:#c07828;
    --shadow:0 8px 36px rgba(0,0,0,.65);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;display:flex;flex-direction:column;overflow:hidden}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.04}

  /* ── TOPBAR ── */
  .topbar{background:rgba(8,12,16,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:0 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:200}
  .brand{font-family:Georgia,serif;font-weight:700;font-size:16px;white-space:nowrap;padding:14px 0;color:var(--ink);letter-spacing:-.02em;display:flex;align-items:baseline;gap:7px}
  .brand b{background:linear-gradient(105deg,var(--gold-light),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand-sub{font-size:11px;color:var(--ink-soft);font-weight:400;font-family:system-ui}
  .flow{display:flex;align-items:center;gap:0;border-left:1px solid var(--line);margin-left:4px;padding-left:14px}
  .flow-step{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.14s;white-space:nowrap}
  .flow-step:hover{background:rgba(255,255,255,.04)}
  .flow-step .fs-label{color:var(--ink-soft)}
  .flow-step.active .fs-label{color:var(--ink)}
  .flow-step .fs-time{font-size:10px;color:var(--ink-dim);display:block;margin-top:1px}
  .flow-step[data-tab="badge"].active{position:relative}
  .flow-step[data-tab="badge"].active::after{content:'';position:absolute;bottom:-1px;left:12px;right:12px;height:2px;border-radius:1px;background:var(--gold)}
  .flow-step[data-tab="food"].active::after{content:'';position:absolute;bottom:-1px;left:12px;right:12px;height:2px;border-radius:1px;background:var(--teal)}
  .flow-arrow{color:var(--ink-dim);font-size:13px;padding:0 2px;flex-shrink:0}
  .topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
  .tb-btn{display:flex;align-items:center;gap:6px;border:1px solid var(--line2);background:transparent;color:var(--ink-soft);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:.14s;white-space:nowrap}
  .tb-btn:hover{border-color:var(--gold-dim);color:var(--gold-light)}
  .tb-btn.teal:hover{border-color:var(--teal);color:var(--teal-light)}
  .tb-btn .sugg-cnt{font-size:10px;background:var(--teal);color:#fff;border-radius:999px;padding:0 6px;margin-left:2px;display:none}
  .tb-btn .sugg-cnt.show{display:inline}

  /* ── LAYOUT ── */
  .layout{display:grid;grid-template-columns:272px 1fr;flex:1;min-height:0}

  /* ── LEFT ── */
  .list-panel{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
  .list-header{padding:13px 18px 11px;border-bottom:1px solid var(--line);flex-shrink:0}
  .list-header .h-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim)}
  .list-header .h-title{font-size:14px;font-weight:700;color:var(--ink);margin-top:2px}
  .list-scroll{overflow-y:auto;flex:1}
  .list-scroll::-webkit-scrollbar{width:3px}
  .list-scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
  .list-group-label{padding:11px 18px 5px;font-size:9.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px}
  .list-group-label i{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
  .list-item{display:flex;align-items:center;gap:11px;padding:10px 18px;cursor:pointer;border-left:2px solid transparent;transition:background .12s,border-color .12s}
  .list-item:hover{background:rgba(255,255,255,.028)}
  .list-item.active{background:rgba(200,164,74,.055);border-left-color:var(--gold)}
  .list-item.active.food-item{background:rgba(26,144,128,.055);border-left-color:var(--teal)}
  .item-num{width:22px;height:22px;border-radius:6px;flex-shrink:0;background:var(--panel2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--ink-dim);transition:.12s}
  .list-item.active .item-num{background:var(--gold);border-color:var(--gold);color:#060a0e}
  .list-item.active.food-item .item-num{background:var(--teal);border-color:var(--teal);color:#fff}
  .item-body{min-width:0;flex:1}
  .item-name{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
  .item-tag-sm{font-size:9px;font-weight:700;letter-spacing:.05em;padding:0 5px;border-radius:3px;flex-shrink:0;border:1px solid}
  .item-tag-sm.combo{color:var(--gold-light);border-color:rgba(200,164,74,.3);background:rgba(200,164,74,.08)}
  .item-tag-sm.food{color:var(--teal-light);border-color:rgba(26,144,128,.3);background:rgba(26,144,128,.08)}
  .item-sub{font-size:11px;color:var(--ink-dim);margin-top:1px}
  .item-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
  .item-star{font-size:11.5px;font-weight:700;color:var(--gold);white-space:nowrap}
  .item-star.teal{color:var(--teal-light)}
  .item-votes{font-size:10px;color:var(--ink-dim);white-space:nowrap}
  .item-votes.has-votes{color:var(--gold-light)}

  /* ── RIGHT ── */
  .detail-panel{overflow-y:auto;background:radial-gradient(ellipse 130% 50% at 80% -8%,#0d1e30 0%,transparent 55%),var(--bg)}
  .detail-panel::-webkit-scrollbar{width:4px}
  .detail-panel::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
  .detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--ink-dim);text-align:center;gap:10px;padding:48px}
  .detail-empty .icon{font-size:30px;opacity:.22}
  .detail-empty p{font-size:13.5px;line-height:1.8;color:var(--ink-soft)}
  .detail-content{padding:30px 38px 60px;max-width:700px}

  .d-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:6px}
  .d-name{font-family:Georgia,serif;font-size:clamp(20px,2.8vw,28px);font-weight:700;letter-spacing:-.025em;line-height:1.2}
  .d-ctag{font-size:10px;font-weight:700;padding:4px 11px;border-radius:7px;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;margin-top:4px}
  .d-ctag.badge{background:rgba(200,164,74,.11);color:var(--gold-light);border:1px solid rgba(200,164,74,.24)}
  .d-ctag.food{background:rgba(26,144,128,.11);color:var(--teal-light);border:1px solid rgba(26,144,128,.24)}
  .d-meta{display:flex;flex-wrap:wrap;gap:7px 16px;margin:11px 0 18px;font-size:13px;color:var(--ink-soft);align-items:center}
  .d-stars{color:var(--gold);font-weight:700}
  .d-stars.teal{color:var(--teal-light)}
  .d-region{font-size:11.5px;background:rgba(255,255,255,.03);border:1px solid var(--line);padding:2px 9px;border-radius:4px}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .info-card{background:rgba(255,255,255,.022);border:1px solid var(--line);border-radius:11px;padding:12px 14px}
  .info-card .ic-label{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:4px}
  .info-card .ic-val{font-size:13px;color:var(--ink);font-weight:600;line-height:1.5}
  .info-card .ic-val.hl{color:var(--gold-light);font-weight:700}
  .info-card .ic-val.hl-teal{color:var(--teal-light);font-weight:700}
  .d-section{margin-bottom:20px}
  .d-section-lbl{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:7px}
  .d-note{font-size:13.5px;color:var(--ink-soft);line-height:1.75;background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .facilities{display:flex;flex-wrap:wrap;gap:6px}
  .fac{font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:999px;background:rgba(255,255,255,.03);border:1px solid var(--line);color:var(--ink-soft)}
  .d-flags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
  .flag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}
  .flag.combo{background:rgba(200,164,74,.1);border:1px solid rgba(200,164,74,.22);color:var(--gold-light)}
  .flag.lowrel{background:rgba(192,120,40,.1);border:1px solid rgba(192,120,40,.22);color:var(--warn)}
  .flag.rec{background:rgba(26,144,128,.1);border:1px solid rgba(26,144,128,.22);color:var(--teal-light)}
  .map-wrap{border-radius:13px;overflow:hidden;border:1px solid var(--line);margin-bottom:20px;position:relative;background:var(--panel2)}
  .map-wrap iframe{display:block;width:100%;height:200px;border:none;opacity:.88;filter:invert(90%) hue-rotate(185deg) saturate(1.15) brightness(.85)}
  .map-overlay{position:absolute;bottom:9px;right:9px;background:rgba(8,12,16,.85);border:1px solid var(--line2);border-radius:7px;padding:4px 10px;font-size:11px;color:var(--ink-soft);backdrop-filter:blur(8px)}
  .map-overlay a{color:var(--gold-light);text-decoration:none;font-weight:600}
  .d-links{display:flex;gap:9px;margin-bottom:20px;flex-wrap:wrap}
  .d-link{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.03);border:1px solid var(--line2);border-radius:10px;padding:9px 15px;font-size:12.5px;font-weight:600;color:var(--ink-soft);text-decoration:none;transition:.14s}
  .d-link:hover{border-color:var(--gold-dim);color:var(--gold-light)}

  /* ── VOTE SECTION ── */
  .vote-section{
    display:flex;align-items:center;gap:14px;
    background:rgba(255,255,255,.022);border:1px solid var(--line);
    border-radius:14px;padding:16px 20px;margin-bottom:8px;
  }
  .vote-btn{
    display:flex;align-items:center;gap:8px;
    border:1.5px solid var(--gold-dim);background:rgba(200,164,74,.07);
    color:var(--gold-light);border-radius:10px;padding:10px 18px;
    font-size:14px;font-weight:700;cursor:pointer;transition:.15s;
  }
  .vote-btn:hover{background:rgba(200,164,74,.15);border-color:var(--gold);box-shadow:0 0 18px rgba(200,164,74,.18)}
  .vote-btn.voted{background:rgba(200,164,74,.22);border-color:var(--gold);color:var(--gold);cursor:default}
  .vote-btn .vote-num{font-size:18px;font-weight:800;color:var(--gold-light);min-width:24px;text-align:center}
  .vote-label{font-size:13px;color:var(--ink-soft);line-height:1.4}
  .vote-label b{color:var(--ink);display:block;font-size:14px}

  /* ── SUGGESTION MODAL ── */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(4,8,14,.85);backdrop-filter:blur(8px);
    z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;
    opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .modal-overlay.open{opacity:1;pointer-events:auto}
  .modal{
    background:linear-gradient(160deg,#111d2c,#0c1620);
    border:1px solid var(--line2);border-radius:20px;
    box-shadow:0 24px 64px rgba(0,0,0,.7);
    padding:28px 28px 24px;width:100%;max-width:480px;
    transform:translateY(16px);transition:transform .2s;
  }
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .modal-head h3{font-family:Georgia,serif;font-size:20px;font-weight:700}
  .modal-close{background:transparent;border:none;color:var(--ink-soft);font-size:20px;cursor:pointer;padding:4px;line-height:1}
  .modal-close:hover{color:var(--ink)}
  .modal-hint{font-size:12.5px;color:var(--ink-soft);margin-bottom:20px;line-height:1.5}
  .form-group{margin-bottom:14px}
  .form-group label{display:block;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:6px}
  .form-group input,.form-group select,.form-group textarea{
    width:100%;background:rgba(255,255,255,.035);border:1px solid var(--line2);
    border-radius:10px;padding:10px 13px;font-size:13.5px;color:var(--ink);
    font-family:inherit;outline:none;transition:border-color .14s;
  }
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--teal)}
  .form-group select{cursor:pointer}
  .form-group select option{background:#0e1520}
  .form-group textarea{resize:vertical;min-height:80px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-actions{display:flex;gap:10px;margin-top:18px}
  .btn-submit{
    flex:1;background:linear-gradient(120deg,rgba(26,144,128,.25),rgba(26,144,128,.12));
    border:1.5px solid var(--teal);color:var(--teal-light);
    border-radius:10px;padding:11px;font-size:14px;font-weight:700;
    cursor:pointer;transition:.15s;
  }
  .btn-submit:hover{background:linear-gradient(120deg,rgba(26,144,128,.4),rgba(26,144,128,.2));box-shadow:0 4px 20px rgba(26,144,128,.2)}
  .btn-submit:disabled{opacity:.5;cursor:not-allowed}
  .btn-cancel{background:transparent;border:1px solid var(--line);color:var(--ink-soft);border-radius:10px;padding:11px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:.14s}
  .btn-cancel:hover{border-color:var(--coral);color:var(--coral)}

  /* ── SUGGESTIONS PANEL ── */
  .sugg-overlay{position:fixed;inset:0;background:rgba(4,8,14,.85);backdrop-filter:blur(8px);z-index:900;display:flex;align-items:stretch;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
  .sugg-overlay.open{opacity:1;pointer-events:auto}
  .sugg-panel{
    background:linear-gradient(160deg,#0e1b28,#0a1318);
    border-left:1px solid var(--line2);width:100%;max-width:480px;
    display:flex;flex-direction:column;overflow:hidden;
    transform:translateX(40px);transition:transform .2s;
  }
  .sugg-overlay.open .sugg-panel{transform:translateX(0)}
  .sugg-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line);flex-shrink:0}
  .sugg-head h3{font-family:Georgia,serif;font-size:18px;font-weight:700}
  .sugg-head .sh-right{display:flex;align-items:center;gap:10px}
  .btn-add-sugg{display:flex;align-items:center;gap:6px;background:rgba(26,144,128,.12);border:1px solid var(--teal);color:var(--teal-light);border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;transition:.14s}
  .btn-add-sugg:hover{background:rgba(26,144,128,.22)}
  .sugg-list{overflow-y:auto;flex:1;padding:12px}
  .sugg-list::-webkit-scrollbar{width:3px}
  .sugg-list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
  .sugg-empty{padding:48px;text-align:center;color:var(--ink-soft);font-size:13.5px;line-height:1.7}
  .sugg-card{
    background:rgba(255,255,255,.022);border:1px solid var(--line);
    border-radius:13px;padding:14px 16px;margin-bottom:10px;
  }
  .sugg-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
  .sugg-card-name{font-size:14px;font-weight:800;color:var(--ink)}
  .sugg-cat-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}
  .sugg-cat-tag.badge{background:rgba(200,164,74,.1);color:var(--gold-light);border:1px solid rgba(200,164,74,.22)}
  .sugg-cat-tag.food{background:rgba(26,144,128,.1);color:var(--teal-light);border:1px solid rgba(26,144,128,.22)}
  .sugg-meta{font-size:12px;color:var(--ink-dim);margin-bottom:8px}
  .sugg-note{font-size:12.5px;color:var(--ink-soft);line-height:1.6;margin-bottom:10px}
  .sugg-footer{display:flex;align-items:center;justify-content:space-between}
  .sugg-time{font-size:11px;color:var(--ink-dim)}
  .sugg-vote-btn{display:flex;align-items:center;gap:6px;border:1px solid var(--line2);background:transparent;color:var(--ink-soft);border-radius:7px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;transition:.14s}
  .sugg-vote-btn:hover{border-color:var(--teal);color:var(--teal-light)}
  .sugg-vote-btn.voted{border-color:var(--teal);color:var(--teal-light);background:rgba(26,144,128,.1);cursor:default}

  /* ── TOAST ── */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);
    background:#1a2e3e;border:1px solid var(--line2);border-radius:10px;
    padding:10px 18px;font-size:13px;font-weight:600;color:var(--ink);
    z-index:2000;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  :focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}

  /* ── MOBILE BACK BTN ── */
  .mobile-back{display:none;align-items:center;gap:8px;padding:13px 16px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;border-bottom:1px solid var(--line);background:rgba(8,12,16,.96);position:sticky;top:0;z-index:10}
  .mobile-back:hover{color:var(--gold-light)}
  .mobile-back svg{flex-shrink:0}

  /* ── MOBILE ── */
  @media(max-width:767px){
    body{overflow:auto}

    .topbar{padding:0 10px;min-height:48px;gap:6px;flex-wrap:nowrap}
    .brand{padding:8px 0;font-size:13px;gap:5px}
    .brand-sub{display:none}
    .flow{border-left:none;margin-left:0;padding-left:0;gap:4px}
    .flow>div:not(.flow-step),.flow-arrow{display:none}
    .flow-step{padding:5px 10px;font-size:11px;border:1px solid var(--line2);border-radius:7px}
    .flow-step[data-tab="badge"].active{border-color:var(--gold);background:rgba(200,164,74,.12)}
    .flow-step[data-tab="food"].active{border-color:var(--teal);background:rgba(26,144,128,.12)}
    .flow-step[data-tab="badge"].active::after,.flow-step[data-tab="food"].active::after{display:none}
    .flow-step .fs-time{display:none}
    .tb-btn-label{display:none}
    .tb-btn{padding:6px 10px}

    .layout{display:flex;flex-direction:column;grid-template-columns:unset;height:auto!important;flex:unset;min-height:0}
    .list-panel{border-right:none;overflow:visible;flex:unset;min-height:0}
    .list-scroll{overflow-y:visible;flex:unset;max-height:none}

    .detail-panel{
      position:fixed;inset:0;z-index:300;
      transform:translateX(110%);
      transition:transform .25s cubic-bezier(.4,0,.2,1);
      overflow-y:auto;background:var(--bg);
    }
    .detail-panel.mobile-open{transform:translateX(0)}
    .mobile-back{display:flex}

    .detail-content{padding:16px 16px 80px;max-width:none}
    .info-grid{grid-template-columns:1fr}
    .vote-section{flex-direction:column;align-items:flex-start;gap:10px}
    .d-top{flex-wrap:wrap}

    .modal-overlay{align-items:flex-end;padding:0}
    .modal{border-radius:16px 16px 0 0;max-width:none;padding:20px 20px 32px}

    .sugg-panel{max-width:none}
  }
</style>

/* ── STATE ── */
const state = { tab:'badge', selectedIdx:null };
const voteCounts = {}; // placeId -> count (realtime)
let voteListeners = {}; // active listeners

function placeId(p) {
  const list = p.cat === 'badge' ? BADGE : FOOD;
  return p.cat + '_' + list.indexOf(p);
}

/* ── FIRESTORE: VOTES ── */
function subscribeVotes() {
  // Listen to all vote docs
  db.collection('votes').onSnapshot(snap => {
    snap.forEach(d => { voteCounts[d.id] = d.data().count || 0; });
    refreshVoteCounts();
  });
}

function refreshVoteCounts() {
  // update list item vote badges
  document.querySelectorAll('.item-votes').forEach(el => {
    const pid = el.dataset.pid;
    const c = voteCounts[pid] || 0;
    el.textContent = c > 0 ? `👍 ${c}` : '';
    el.classList.toggle('has-votes', c > 0);
  });
  // update detail panel if open
  const vnum = document.getElementById('voteNum');
  const vpid = document.getElementById('detailContent')?.dataset.pid;
  if (vnum && vpid) vnum.textContent = voteCounts[vpid] || 0;
}

async function doVote(pid) {
  const key = 'voted_' + pid;
  const already = !!localStorage.getItem(key);
  const delta = already ? -1 : 1;
  try {
    await db.collection('votes').doc(pid).set(
      { count: firebase.firestore.FieldValue.increment(delta) },
      { merge: true }
    );
    const btn = document.getElementById('voteBtn');
    if (already) {
      localStorage.removeItem(key);
      if (btn) { btn.classList.remove('voted'); btn.querySelector('.vote-text').textContent = '가고 싶어요'; }
      showToast('투표를 취소했습니다.');
    } else {
      localStorage.setItem(key, '1');
      if (btn) { btn.classList.add('voted'); btn.querySelector('.vote-text').textContent = '투표 취소'; }
      showToast('투표했습니다! 👍');
    }
  } catch(e) { showToast('오류가 발생했습니다. 다시 시도해 주세요.'); console.error(e); }
}

/* ── FIRESTORE: SUGGESTIONS ── */
function subscribeSuggestions() {
  db.collection('suggestions').orderBy('createdAt', 'desc').onSnapshot(snap => {
    const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderSuggestions(items);
    // update count badge
    const cnt = document.getElementById('suggCnt');
    if (items.length > 0) { cnt.textContent = items.length; cnt.classList.add('show'); }
    else { cnt.classList.remove('show'); }
  });
}

function renderSuggestions(items) {
  const wrap = document.getElementById('suggList');
  if (!items.length) {
    wrap.innerHTML = '<div class="sugg-empty">아직 제안된 장소가 없습니다.<br>+ 새 제안 버튼으로 추가해 보세요.</div>';
    return;
  }
  wrap.innerHTML = items.map(s => {
    const voted = !!localStorage.getItem('svoted_' + s.id);
    const catLabel = s.cat === 'badge' ? '빠지' : '식사';
    const ago = s.createdAt ? timeAgo(s.createdAt.toDate()) : '';
    return `<div class="sugg-card">
      <div class="sugg-card-top">
        <div class="sugg-card-name">${escHtml(s.name)}</div>
        <span class="sugg-cat-tag ${s.cat}">${catLabel}</span>
      </div>
      ${s.region ? `<div class="sugg-meta">📍 ${escHtml(s.region)}</div>` : ''}
      ${s.note ? `<div class="sugg-note">${escHtml(s.note)}</div>` : ''}
      <div class="sugg-footer">
        <span class="sugg-time">${ago}</span>
        <button class="sugg-vote-btn${voted?' voted':''}" data-sid="${s.id}">
          👍 ${s.votes || 0}${voted?' · 취소':''}
        </button>
      </div>
    </div>`;
  }).join('');
  // attach vote handlers
  wrap.querySelectorAll('.sugg-vote-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const sid = btn.dataset.sid;
      const key = 'svoted_' + sid;
      const already = !!localStorage.getItem(key);
      const delta = already ? -1 : 1;
      try {
        await db.collection('suggestions').doc(sid).update({ votes: firebase.firestore.FieldValue.increment(delta) });
        if (already) { localStorage.removeItem(key); showToast('제안 투표를 취소했습니다.'); }
        else { localStorage.setItem(key, '1'); showToast('제안에 투표했습니다 👍'); }
      } catch(e) { showToast('오류 발생. 다시 시도해 주세요.'); }
    });
  });
}

async function submitSuggestion(data) {
  await db.collection('suggestions').add({
    ...data,
    votes: 0,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

/* ── UI HELPERS ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(date) {
  const diff = Math.floor((Date.now() - date) / 1000);
  if (diff < 60) return '방금 전';
  if (diff < 3600) return Math.floor(diff/60) + '분 전';
  if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
  return Math.floor(diff/86400) + '일 전';
}

function switchTab(tab) {
  state.tab = tab; state.selectedIdx = null;
  document.querySelectorAll('.flow-step[data-tab]').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('hLabel').textContent = TAB_META[tab].label;
  document.getElementById('hTitle').textContent = TAB_META[tab].title;
  renderList(); showEmpty();
}

function renderList() {
  const wrap = document.getElementById('listScroll');
  wrap.innerHTML = '';
  if (state.tab === 'badge') {
    BADGE.forEach((p, i) => appendItem(wrap, p, i + 1, false));
  } else {
    [['춘천 권역','var(--teal)', FOOD.filter(f=>f.region.startsWith('춘천'))],
     ['가평 권역','#a0c878',    FOOD.filter(f=>f.region.startsWith('가평'))]
    ].forEach(([label, color, items]) => {
      const gl = document.createElement('div'); gl.className = 'list-group-label';
      gl.innerHTML = `<i style="background:${color}"></i>${label}`; wrap.appendChild(gl);
      items.forEach((p, i) => appendItem(wrap, p, i + 1, true));
    });
  }
}

function appendItem(wrap, p, num, isFood) {
  const list = isFood ? FOOD : BADGE;
  const idx = list.indexOf(p);
  const pid = placeId(p);
  const el = document.createElement('div');
  el.className = 'list-item' + (state.selectedIdx === idx ? ' active' : '') + (isFood ? ' food-item' : '');
  el.dataset.idx = idx;
  const tags = [];
  if (p.combo) tags.push(`<span class="item-tag-sm combo">통합형</span>`);
  if (p.foodType) tags.push(`<span class="item-tag-sm food">${p.foodType}</span>`);
  const vc = voteCounts[pid] || 0;
  el.innerHTML = `
    <div class="item-num">${num}</div>
    <div class="item-body">
      <div class="item-name">${p.name.replace(/^가평빠지 /,'')} ${tags.join('')}</div>
      <div class="item-sub">${p.region}</div>
    </div>
    <div class="item-right">
      ${p.rating ? `<div class="item-star${isFood?' teal':''}">★ ${p.rating.toFixed(1)}</div>` : ''}
      <div class="item-votes${vc>0?' has-votes':''}" data-pid="${pid}">${vc>0?'👍 '+vc:''}</div>
    </div>`;
  el.addEventListener('click', () => {
    state.selectedIdx = idx; renderList(); renderDetail(p, isFood);
    if (window.innerWidth < 768) document.getElementById('detailPanel').classList.add('mobile-open');
  });
  wrap.appendChild(el);
}

function showEmpty() {
  document.getElementById('detailEmpty').style.display = 'flex';
  document.getElementById('detailContent').style.display = 'none';
}

/* ── DETAIL ── */
function renderDetail(p, isFood) {
  const pid = placeId(p);
  const low = p.rc !== null && p.rc < 15;
  const catLabel = isFood ? (p.foodType || '식사') : '빠지';
  const catClass = isFood ? 'food' : 'badge';
  const mapsUrl = `https://www.google.com/maps?q=${p.lat},${p.lng}`;
  const osmEmbed = `https://www.openstreetmap.org/export/embed.html?bbox=${p.lng-.018},${p.lat-.012},${p.lng+.018},${p.lat+.012}&layer=mapnik&marker=${p.lat},${p.lng}`;
  const voted = !!localStorage.getItem('voted_' + pid);
  const vc = voteCounts[pid] || 0;

  const infoCards = [];
  if (p.priceRange) infoCards.push(`<div class="info-card"><div class="ic-label">가격대</div><div class="ic-val ${isFood?'hl-teal':'hl'}">${p.priceRange}</div></div>`);
  if (p.fromSeoul) infoCards.push(`<div class="info-card"><div class="ic-label">서울에서</div><div class="ic-val">${p.fromSeoul}</div></div>`);
  if (p.fromBaji) infoCards.push(`<div class="info-card"><div class="ic-label">빠지에서 이동</div><div class="ic-val">${p.fromBaji}</div></div>`);
  if (p.openHours) infoCards.push(`<div class="info-card"><div class="ic-label">운영 시간</div><div class="ic-val">${p.openHours}</div></div>`);
  if (p.season) infoCards.push(`<div class="info-card"><div class="ic-label">운영 시즌</div><div class="ic-val">${p.season}</div></div>`);
  if (p.bestFor) infoCards.push(`<div class="info-card"><div class="ic-label">추천</div><div class="ic-val">${p.bestFor.join(' · ')}</div></div>`);
  const facilitiesHtml = (p.facilities||[]).map(f=>`<span class="fac">${f}</span>`).join('');

  document.getElementById('detailEmpty').style.display = 'none';
  const dc = document.getElementById('detailContent');
  dc.style.display = ''; dc.dataset.pid = pid;
  dc.innerHTML = `
    <div class="d-top">
      <div class="d-name">${p.name.replace(/^가평빠지 /,'')}</div>
      <span class="d-ctag ${catClass}">${catLabel}</span>
    </div>
    <div class="d-meta">
      ${p.rating?`<span class="d-stars${isFood?' teal':''}">★ ${p.rating.toFixed(1)}</span><span style="color:var(--ink-dim)">·</span>`:''}
      ${p.rc?`<span>후기 ${p.rc}건</span>`:''}
      <span class="d-region">${p.region}</span>
    </div>
    ${infoCards.length?`<div class="info-grid">${infoCards.join('')}</div>`:''}
    <div class="d-section">
      <div class="d-section-lbl">장소 정보</div>
      <div class="d-note">${p.note}</div>
    </div>
    ${p.must?`<div class="d-section"><div class="d-section-lbl">추천 메뉴 · 팁</div><div class="d-note" style="border-color:rgba(26,144,128,.25)">🍴 ${p.must}</div></div>`:''}
    ${facilitiesHtml?`<div class="d-section"><div class="d-section-lbl">${isFood?'편의':'시설·특징'}</div><div class="facilities">${facilitiesHtml}</div></div>`:''}
    ${(p.combo||low)?`<div class="d-flags">${p.combo?'<span class="flag combo">숙박+빠지 통합형(추정)</span>':''}${low?'<span class="flag lowrel">후기 표본 작음</span>':''}</div>`:''}
    <div class="d-section">
      <div class="d-section-lbl">위치</div>
      <div class="map-wrap">
        <iframe src="${osmEmbed}" loading="lazy" title="${p.name} 위치"></iframe>
        <div class="map-overlay"><a href="${mapsUrl}" target="_blank" rel="noopener">Google Maps ↗</a></div>
      </div>
    </div>
    <div class="d-links">
      ${p.url?`<a class="d-link" href="${p.url}" target="_blank" rel="noopener">🔗 웹사이트</a>`:''}
      ${p.tel?`<a class="d-link" href="tel:${p.tel.replace(/[^0-9+]/g,'')}">📞 ${p.tel}</a>`:''}
      <a class="d-link" href="${mapsUrl}" target="_blank" rel="noopener">📍 지도</a>
    </div>
    <div class="d-section-lbl" style="margin-bottom:10px">이 장소 어때요?</div>
    <div class="vote-section">
      <button class="vote-btn${voted?' voted':''}" id="voteBtn">
        <span class="vote-num" id="voteNum">${vc}</span>
        👍 <span class="vote-text">${voted?'투표 취소':'가고 싶어요'}</span>
      </button>
      <div class="vote-label"><b>${voted?'투표했습니다. 다시 누르면 취소됩니다.':'이 장소에 투표하세요'}</b>모든 사람의 투표가 실시간 반영됩니다.</div>
    </div>`;

  document.getElementById('voteBtn').addEventListener('click', () => doVote(pid));
}

/* ── MODAL / PANEL EVENTS ── */
function openSuggPanel() { document.getElementById('suggOverlay').classList.add('open'); }
function closeSuggPanel() { document.getElementById('suggOverlay').classList.remove('open'); }
function openSuggModal() { document.getElementById('suggModal').classList.add('open'); }
function closeSuggModal() { document.getElementById('suggModal').classList.remove('open'); document.getElementById('suggForm').reset(); }

document.getElementById('btnShowSugg').addEventListener('click', openSuggPanel);
document.getElementById('btnCloseSugg').addEventListener('click', closeSuggPanel);
document.getElementById('btnOpenModal').addEventListener('click', openSuggModal);
document.getElementById('btnCloseModal').addEventListener('click', closeSuggModal);
document.getElementById('btnCancelModal').addEventListener('click', closeSuggModal);
document.getElementById('suggOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeSuggPanel(); });
document.getElementById('suggModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeSuggModal(); });

document.getElementById('suggForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = { name: fd.get('name').trim(), cat: fd.get('cat'), region: fd.get('region').trim(), note: fd.get('note').trim() };
  if (!data.name) return;
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = '등록 중...';
  try {
    await submitSuggestion(data);
    closeSuggModal(); openSuggPanel();
    showToast('제안이 등록되었습니다! 💡');
  } catch(err) { showToast('오류 발생. 다시 시도해 주세요.'); console.error(err); }
  finally { btn.disabled = false; btn.textContent = '제안 등록'; }
});

/* ── FLOW TAB CLICK ── */
document.querySelectorAll('.flow-step[data-tab]').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});

/* ── INIT ── */
function fixHeight() {
  if (window.innerWidth >= 768) {
    const tbar = document.querySelector('.topbar').offsetHeight;
    document.getElementById('layout').style.height = (window.innerHeight - tbar) + 'px';
  } else {
    document.getElementById('layout').style.height = '';
  }
}
window.addEventListener('resize', fixHeight); fixHeight();

document.getElementById('mobileBack').addEventListener('click', () => {
  document.getElementById('detailPanel').classList.remove('mobile-open');
});

subscribeVotes();
subscribeSuggestions();
switchTab('badge');
</script>
</body>
</html>
